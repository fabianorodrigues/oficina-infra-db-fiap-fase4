# Template do Kubernetes Job de bootstrap dos bancos.
# Os campos com marcadores no formato de dois sublinhados sao substituidos pelo
# render-database-bootstrap-manifests.ps1 por valores nao sensiveis: nome unico
# do Job, ServiceAccount, imagem versionada (nunca :latest), SecretProviderClass,
# ConfigMap dos scripts, endpoint/porta do RDS (do SSM), flag de certificado e
# os limites do Job (backoff/deadline/ttl).
#
# Sem passwords, sem connection strings e sem credenciais AWS em variaveis de
# ambiente. Senhas chegam apenas pelo volume CSI somente leitura.
apiVersion: batch/v1
kind: Job
metadata:
  name: __JOB_NAME__
  namespace: oficina
  labels:
    app.kubernetes.io/name: oficina-db-bootstrap
    app.kubernetes.io/part-of: oficina
spec:
  backoffLimit: __BACKOFF_LIMIT__
  activeDeadlineSeconds: __ACTIVE_DEADLINE_SECONDS__
  ttlSecondsAfterFinished: __TTL_SECONDS_AFTER_FINISHED__
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oficina-db-bootstrap
        app.kubernetes.io/part-of: oficina
    spec:
      restartPolicy: Never
      serviceAccountName: __SERVICE_ACCOUNT_NAME__
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bootstrap
          image: __SQL_TOOLS_IMAGE__
          imagePullPolicy: IfNotPresent
          command:
            - /usr/bin/env
            - bash
            - /opt/bootstrap/scripts/run-database-bootstrap.sh
          env:
            - name: RDS_HOST
              value: "__RDS_HOST__"
            - name: RDS_PORT
              value: "__RDS_PORT__"
            - name: SECRETS_DIR
              value: /mnt/secrets
            - name: SCRIPTS_DIR
              value: /opt/bootstrap/scripts
            - name: WORK_DIR
              value: /work
            - name: HOME
              value: /tmp
            - name: SQL_ENCRYPT_TRUST_SERVER_CERT
              value: "__SQL_ENCRYPT_TRUST_SERVER_CERT__"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets
              readOnly: true
            - name: scripts
              mountPath: /opt/bootstrap/scripts
              readOnly: true
            - name: work
              mountPath: /work
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: __SECRET_PROVIDER_CLASS_NAME__
        - name: scripts
          configMap:
            name: __CONFIG_MAP_NAME__
            defaultMode: 0555
        - name: work
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
