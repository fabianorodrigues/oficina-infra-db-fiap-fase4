# Kustomization dedicada a geracao do ConfigMap dos scripts a partir das fontes
# canonicas em scripts/. Mantem uma unica copia dos scripts (sem duplicacao) e
# um nome estavel (disableNameSuffixHash).
#
# A pipeline gera o ConfigMap com:
#   kubectl kustomize --load-restrictor LoadRestrictionsNone deploy/bootstrap
# porque os arquivos ficam fora do diretorio da kustomization.
#
# ServiceAccount, SecretProviderClass e Job sao renderizados a parte
# (render-database-bootstrap-manifests.ps1) por conterem valores dinamicos e
# aplicados individualmente pelo workflow. O ConfigMap contem somente scripts
# nao sensiveis; nenhum secret e incluido aqui.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: oficina

generatorOptions:
  disableNameSuffixHash: true
  labels:
    app.kubernetes.io/name: oficina-db-bootstrap
    app.kubernetes.io/part-of: oficina

configMapGenerator:
  - name: oficina-db-bootstrap-scripts
    files:
      - ../../scripts/bootstrap-databases.sql
      - ../../scripts/validate-databases.sql
      - ../../scripts/run-database-bootstrap.sh
