# Template de SecretProviderClass para o Secrets Store CSI Driver + ASCP.
# Os campos com marcadores no formato de dois sublinhados sao substituidos pelo
# render-database-bootstrap-manifests.ps1: nome da SecretProviderClass, regiao
# AWS, usePodIdentity ("true" em pod-identity, "false" em IRSA) e o ARN do
# master secret gerenciado pelo RDS.
#
# Monta somente os campos necessarios via jmesPath:
#   * master secret  -> username/password (aliases master-username/master-password)
#   * 7 secrets SQL  -> apenas o campo Password (aliases *-password)
# Nao sincroniza para Kubernetes Secret (sem secretObjects); os valores
# permanecem apenas no volume CSI somente leitura.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: __SECRET_PROVIDER_CLASS_NAME__
  namespace: oficina
  labels:
    app.kubernetes.io/name: oficina-db-bootstrap
    app.kubernetes.io/part-of: oficina
spec:
  provider: aws
  parameters:
    region: __AWS_REGION__
    usePodIdentity: "__USE_POD_IDENTITY__"
    objects: |
      - objectName: "__MASTER_SECRET_ARN__"
        objectType: "secretsmanager"
        jmesPath:
          - path: "username"
            objectAlias: "master-username"
          - path: "password"
            objectAlias: "master-password"
      - objectName: "/oficina/cadastro/runtime-db"
        objectType: "secretsmanager"
        jmesPath:
          - path: "Password"
            objectAlias: "cadastro-app-password"
      - objectName: "/oficina/cadastro/migration-db"
        objectType: "secretsmanager"
        jmesPath:
          - path: "Password"
            objectAlias: "cadastro-migrator-password"
      - objectName: "/oficina/estoque/runtime-db"
        objectType: "secretsmanager"
        jmesPath:
          - path: "Password"
            objectAlias: "estoque-app-password"
      - objectName: "/oficina/estoque/migration-db"
        objectType: "secretsmanager"
        jmesPath:
          - path: "Password"
            objectAlias: "estoque-migrator-password"
      - objectName: "/oficina/ordens/runtime-db"
        objectType: "secretsmanager"
        jmesPath:
          - path: "Password"
            objectAlias: "ordens-app-password"
      - objectName: "/oficina/ordens/migration-db"
        objectType: "secretsmanager"
        jmesPath:
          - path: "Password"
            objectAlias: "ordens-migrator-password"
      - objectName: "/oficina/auth/database"
        objectType: "secretsmanager"
        jmesPath:
          - path: "Password"
            objectAlias: "auth-read-password"
