# ServiceAccount consumidora do bootstrap de bancos.
#
# A identidade (EKS Pod Identity Association ou IRSA) e a policy de leitura dos
# secrets pertencem a Platform (oficina-infra-fiap-fase4), que e a proprietaria
# autoritativa desta ServiceAccount. Este manifesto declara apenas o consumidor
# e nao contem credenciais AWS.
#
# Modo pod-identity (padrao da Platform): nenhuma annotation e necessaria.
# Modo IRSA: o renderer adiciona a annotation eks.amazonaws.com/role-arn a
# partir do Role ARN consultado por SSM/Terraform output no momento do deploy.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: db-bootstrap
  namespace: oficina
  labels:
    app.kubernetes.io/name: oficina-db-bootstrap
    app.kubernetes.io/part-of: oficina
    app.kubernetes.io/managed-by: platform
