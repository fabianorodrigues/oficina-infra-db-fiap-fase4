name: Terraform Backend CI

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/**
      - terraform/backend/**
      - .github/workflows/terraform-backend-*.yml
      - .gitignore
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate backend automation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate PowerShell syntax and AST
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $scripts = @(
            'scripts/create-terraform-backend.ps1',
            'scripts/validate-terraform-backend.ps1'
          )
          foreach ($script in $scripts) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($script, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error "${script}: $($_.Message)" }
              exit 1
            }
          }

      - name: DryRun create script us-east-1
        shell: pwsh
        run: |
          ./scripts/create-terraform-backend.ps1 `
            -BucketName 'oficina-terraform-state-123456789012-us-east-1' `
            -Region 'us-east-1' `
            -DryRun

      - name: DryRun create script sa-east-1
        shell: pwsh
        run: |
          ./scripts/create-terraform-backend.ps1 `
            -BucketName 'oficina-terraform-state-123456789012-sa-east-1' `
            -Region 'sa-east-1' `
            -DryRun

      - name: Validate invalid bucket names
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $invalidNames = @(
            'Oficina-terraform-state',
            'oficina_terraform_state',
            'oficina terraform state',
            '192.168.0.1',
            '<ACCOUNT_ID>',
            'xn--reserved-name'
          )
          foreach ($name in $invalidNames) {
            try {
              ./scripts/create-terraform-backend.ps1 -BucketName $name -Region 'us-east-1' -DryRun
              Write-Error "Bucket invalido aceito: $name"
              exit 1
            }
            catch {
              Write-Host "Bucket invalido rejeitado: $name"
            }
          }

      - name: Validate DryRun does not call AWS
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $bin = Join-Path $env:RUNNER_TEMP 'fakebin'
          New-Item -ItemType Directory -Path $bin | Out-Null
          $fakeAws = Join-Path $bin 'aws'
          Set-Content -Path $fakeAws -Value '#!/usr/bin/env bash' -Encoding utf8
          Add-Content -Path $fakeAws -Value 'echo "AWS must not be called during DryRun" >&2'
          Add-Content -Path $fakeAws -Value 'exit 42'
          chmod +x $fakeAws
          $env:PATH = "$bin$([System.IO.Path]::PathSeparator)$env:PATH"
          ./scripts/create-terraform-backend.ps1 -BucketName 'oficina-terraform-state-123456789012-us-east-1' -Region 'us-east-1' -DryRun

      - name: Validate backend HCL example
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $content = Get-Content -Raw -Path 'terraform/backend/backend-config.example.hcl'
          $required = @(
            'bucket\s*=\s*"REPLACE_WITH_TF_STATE_BUCKET"',
            'key\s*=\s*"REPLACE_WITH_STATE_KEY"',
            'region\s*=\s*"REPLACE_WITH_TF_STATE_REGION"',
            'encrypt\s*=\s*true',
            'use_lockfile\s*=\s*true'
          )
          foreach ($pattern in $required) {
            if ($content -notmatch $pattern) {
              Write-Error "HCL esperado ausente: $pattern"
              exit 1
            }
          }

      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/actionlint"
          cd "$RUNNER_TEMP/actionlint"
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          echo "$RUNNER_TEMP/actionlint" >> "$GITHUB_PATH"

      - name: Actionlint workflows
        shell: bash
        run: actionlint .github/workflows/terraform-backend-ci.yml .github/workflows/terraform-backend-deploy.yml

      - name: Security and scope checks
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = Get-ChildItem -Recurse -File -Force |
            Where-Object {
              $_.FullName -notmatch '[\\/]\.git[\\/]' -and
              $_.FullName -notmatch '[\\/]\.vs[\\/]' -and
              $_.FullName -notmatch '[\\/]\.terraform[\\/]'
            }
          $content = $files | ForEach-Object { Get-Content -Raw -Path $_.FullName }
          $joined = $content -join "`n"

          $credentialPatterns = @('AKIA[0-9A-Z]{16}', 'ASIA[0-9A-Z]{16}', 'aws_access_key_id\s*=', 'aws_secret_access_key\s*=', 'aws_session_token\s*=')
          foreach ($pattern in $credentialPatterns) {
            if ($joined -match $pattern) {
              Write-Error 'Possivel credencial hardcoded encontrada.'
              exit 1
            }
          }

          $pullRequestTarget = 'pull_request' + '_target'
          $forceRemoval = 'force_' + ('des' + 'troy')
          $removalWord = 'des' + 'troy'
          if ($joined -match [regex]::Escape($pullRequestTarget)) { Write-Error 'Trigger de PR privilegiado nao permitido.'; exit 1 }
          if ($joined -match [regex]::Escape($forceRemoval)) { Write-Error 'Remocao forcada nao permitida.'; exit 1 }
          $workflowFiles = Get-ChildItem -Path '.github/workflows' -File
          foreach ($workflowFile in $workflowFiles) {
            if ($workflowFile.Name -match "(?i)$removalWord") {
              Write-Error 'Workflow de remocao nao permitido.'
              exit 1
            }
          }

          $ci = Get-Content -Raw -Path '.github/workflows/terraform-backend-ci.yml'
          $forbiddenCi = @(
            ('aws s3api create' + '-bucket'),
            ('aws s3api ' + 'put-'),
            ('aws create' + '-'),
            ('aws update' + '-'),
            ('aws delete' + '-'),
            ('terraform app' + 'ly'),
            ('terraform des' + 'troy')
          )
          foreach ($item in $forbiddenCi) {
            if ($ci -match [regex]::Escape($item)) {
              Write-Error "Comando de alteracao proibido no CI: $item"
              exit 1
            }
          }

          $deploy = Get-Content -Raw -Path '.github/workflows/terraform-backend-deploy.yml'
          foreach ($required in @('workflow_dispatch', 'confirmation', 'CREATE', 'refs/heads/main', 'contents: read')) {
            if ($deploy -notmatch [regex]::Escape($required)) {
              Write-Error "Configuracao obrigatoria ausente no deploy: $required"
              exit 1
            }
          }
          if ($deploy -match '(?m)^\s*environment\s*:') { Write-Error 'GitHub Environment nao permitido.'; exit 1 }
