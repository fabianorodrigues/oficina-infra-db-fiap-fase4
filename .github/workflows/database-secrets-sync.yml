name: Database Secrets Sync

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Digite SYNC para confirmar a sincronizacao dos secrets SQL.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: database-secrets-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync SQL secrets to Secrets Manager
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      SQL_CADASTRO_APP_PASSWORD: ${{ secrets.SQL_CADASTRO_APP_PASSWORD }}
      SQL_CADASTRO_MIGRATOR_PASSWORD: ${{ secrets.SQL_CADASTRO_MIGRATOR_PASSWORD }}
      SQL_ESTOQUE_APP_PASSWORD: ${{ secrets.SQL_ESTOQUE_APP_PASSWORD }}
      SQL_ESTOQUE_MIGRATOR_PASSWORD: ${{ secrets.SQL_ESTOQUE_MIGRATOR_PASSWORD }}
      SQL_ORDENS_APP_PASSWORD: ${{ secrets.SQL_ORDENS_APP_PASSWORD }}
      SQL_ORDENS_MIGRATOR_PASSWORD: ${{ secrets.SQL_ORDENS_MIGRATOR_PASSWORD }}
      SQL_AUTH_READ_PASSWORD: ${{ secrets.SQL_AUTH_READ_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate branch
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:GITHUB_REF -ne 'refs/heads/main') {
            throw 'Este workflow deve ser executado somente na branch main.'
          }

      - name: Validate confirmation
        shell: pwsh
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:CONFIRMATION -cne 'SYNC') {
            throw 'Confirmacao invalida. Digite exatamente SYNC.'
          }

      - name: Validate AWS region variable
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ([string]::IsNullOrWhiteSpace($env:AWS_REGION)) {
            throw 'Repository Variable obrigatoria vazia: AWS_REGION'
          }

      - name: Validate required repository secrets
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $names = @(
            'SQL_CADASTRO_APP_PASSWORD',
            'SQL_CADASTRO_MIGRATOR_PASSWORD',
            'SQL_ESTOQUE_APP_PASSWORD',
            'SQL_ESTOQUE_MIGRATOR_PASSWORD',
            'SQL_ORDENS_APP_PASSWORD',
            'SQL_ORDENS_MIGRATOR_PASSWORD',
            'SQL_AUTH_READ_PASSWORD'
          )
          $missing = @()
          foreach ($name in $names) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              $missing += $name
            }
          }
          if ($missing.Count -gt 0) {
            throw "Repository Secrets ausentes: $($missing -join ', ')"
          }
          Write-Host 'Os sete Repository Secrets estao presentes.'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Validate AWS identity
        shell: pwsh
        run: aws sts get-caller-identity

      - name: Validate secrets contract
        shell: pwsh
        run: ./scripts/validate-database-secrets-config.ps1 -ConfigPath config/database-secrets.json

      - name: Validate containers before sync
        shell: pwsh
        run: ./scripts/validate-database-secret-containers.ps1 -ConfigPath config/database-secrets.json -Region $env:AWS_REGION -RequireCurrentVersion $false

      - name: Synchronize SQL secrets
        shell: pwsh
        run: ./scripts/sync-database-secrets.ps1 -ConfigPath config/database-secrets.json -Region $env:AWS_REGION

      - name: Validate containers after sync
        shell: pwsh
        run: ./scripts/validate-database-secret-containers.ps1 -ConfigPath config/database-secrets.json -Region $env:AWS_REGION -RequireCurrentVersion $true

      - name: Publish sanitized summary
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $config = Get-Content -LiteralPath 'config/database-secrets.json' -Raw | ConvertFrom-Json
          $secretNames = @($config.targets | ForEach-Object { $_.secretName })
          $lines = @()
          $lines += '## Database Secrets Sync'
          $lines += ''
          $lines += "Regiao: $env:AWS_REGION"
          $lines += "Secrets processados: $($secretNames.Count)"
          $lines += "Containers encontrados: $($secretNames.Count)"
          $lines += "Versoes AWSCURRENT confirmadas: $($secretNames.Count)"
          $lines += ''
          $lines += 'Nomes dos secrets:'
          foreach ($name in $secretNames) { $lines += "- $name" }
          $lines += ''
          $lines += 'Status final: sincronizacao concluida e validada.'
          ($lines -join "`n") | Add-Content -Path $env:GITHUB_STEP_SUMMARY
