name: Database Bootstrap

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type BOOTSTRAP to initialize the databases.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: database-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap:
    name: Bootstrap SQL databases via Kubernetes Job
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      SQL_TOOLS_IMAGE: ${{ vars.SQL_TOOLS_IMAGE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate request
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:GITHUB_REF -ne 'refs/heads/main') {
            throw 'This workflow must run from main.'
          }
          if ('${{ inputs.confirmation }}' -cne 'BOOTSTRAP') {
            throw 'Confirmation must be BOOTSTRAP.'
          }
          if ([string]::IsNullOrWhiteSpace($env:AWS_REGION)) { throw 'Repository Variable AWS_REGION is required.' }
          if ([string]::IsNullOrWhiteSpace($env:SQL_TOOLS_IMAGE)) { throw 'Repository Variable SQL_TOOLS_IMAGE is required.' }
          if ($env:SQL_TOOLS_IMAGE -notmatch ':' -or $env:SQL_TOOLS_IMAGE -match ':latest$') {
            throw 'SQL_TOOLS_IMAGE must use an explicit tag or digest and never latest.'
          }

      - name: Validate contracts
        shell: pwsh
        run: |
          ./scripts/validate-database-secrets-config.ps1 -ConfigPath config/database-secrets.json
          ./scripts/validate-database-bootstrap-config.ps1 -ConfigPath config/database-bootstrap.json -SecretsConfigPath config/database-secrets.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Validate AWS identity
        shell: pwsh
        run: aws sts get-caller-identity

      - name: Resolve AWS metadata
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          function Get-Ssm([string]$name) {
            $v = aws ssm get-parameter --name $name --region $env:AWS_REGION --query 'Parameter.Value' --output text
            if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($v) -or $v -eq 'None') {
              throw "Missing or empty SSM parameter: $name"
            }
            return $v.Trim()
          }
          $clusterName   = Get-Ssm '/oficina/infra/cluster/name'
          $namespace     = Get-Ssm '/oficina/infra/cluster/namespace'
          $rdsHost       = Get-Ssm '/oficina/infra/rds/endpoint'
          $rdsPort       = Get-Ssm '/oficina/infra/rds/port'
          $masterArn     = Get-Ssm '/oficina/infra/rds/master-secret-arn'

          if ($rdsPort -notmatch '^\d+$') { throw "Invalid RDS port in SSM: $rdsPort" }
          if ($namespace -ne 'oficina') { throw "Unexpected namespace from SSM: $namespace" }

          aws secretsmanager describe-secret --secret-id $masterArn --region $env:AWS_REGION --output json | Out-Null
          if ($LASTEXITCODE -ne 0) { throw 'Master secret not found in Secrets Manager.' }

          "CLUSTER_NAME=$clusterName"      | Add-Content -Path $env:GITHUB_ENV
          "NAMESPACE=$namespace"           | Add-Content -Path $env:GITHUB_ENV
          "RDS_HOST=$rdsHost"              | Add-Content -Path $env:GITHUB_ENV
          "RDS_PORT=$rdsPort"              | Add-Content -Path $env:GITHUB_ENV
          "MASTER_SECRET_ARN=$masterArn"   | Add-Content -Path $env:GITHUB_ENV
          Write-Host "Cluster: $clusterName | Namespace: $namespace | RDS: ${rdsHost}:$rdsPort | master secret: OK"

      - name: Validate SQL secrets
        shell: pwsh
        run: ./scripts/validate-database-secret-containers.ps1 -ConfigPath config/database-secrets.json -Region $env:AWS_REGION -RequireCurrentVersion $true

      - name: Update kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION"

      - name: Validate cluster
        shell: bash
        run: |
          set -euo pipefail

          echo "Namespace $NAMESPACE"
          kubectl get namespace "$NAMESPACE" >/dev/null

          echo "Nodes Ready"
          ready=$(kubectl get nodes -o jsonpath='{range .items[*]}{range .status.conditions[?(@.type=="Ready")]}{.status}{"\n"}{end}{end}' | grep -c '^True' || true)
          if [ "${ready:-0}" -lt 1 ]; then echo "No Ready node found." >&2; exit 1; fi
          echo "Nodes Ready: $ready"

          echo "Secrets Store CSI Driver"
          kubectl get csidriver secrets-store.csi.k8s.io >/dev/null

          echo "AWS Secrets and Configuration Provider"
          if ! kubectl get daemonset -n kube-system -l app=secrets-store-csi-driver-provider-aws 2>/dev/null | grep -q .; then
            if ! kubectl get pods -n kube-system -l app.kubernetes.io/name=secrets-store-csi-driver-provider-aws 2>/dev/null | grep -q .; then
              echo "ASCP was not found in kube-system." >&2
              exit 1
            fi
          fi

          echo "db-bootstrap identity"
          kubectl get serviceaccount db-bootstrap -n "$NAMESPACE" >/dev/null

          echo "Planned RDS network access"
          rds_sg=$(aws ssm get-parameter --name /oficina/infra/rds/security-group-id --region "$AWS_REGION" --query 'Parameter.Value' --output text)
          echo "RDS Security Group: $rds_sg"

      - name: Generate scripts ConfigMap
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p rendered
          kubectl kustomize --load-restrictor LoadRestrictionsNone deploy/bootstrap > rendered/configmap.yaml
          if grep -Eiq 'secret_?string|-----BEGIN|AKIA[0-9A-Z]{16}' rendered/configmap.yaml; then
            echo "ConfigMap contains sensitive content." >&2
            exit 1
          fi

      - name: Render manifests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $jobName = "oficina-db-bootstrap-$($env:GITHUB_RUN_ID)-$($env:GITHUB_RUN_ATTEMPT)"
          "JOB_NAME=$jobName" | Add-Content -Path $env:GITHUB_ENV
          ./scripts/render-database-bootstrap-manifests.ps1 `
            -ConfigPath config/database-bootstrap.json `
            -TemplateDirectory deploy/bootstrap `
            -OutputDirectory rendered `
            -JobName $jobName `
            -MasterSecretArn $env:MASTER_SECRET_ARN `
            -Region $env:AWS_REGION `
            -SqlToolsImage $env:SQL_TOOLS_IMAGE `
            -WorkloadIdentityMode 'pod-identity' `
            -RdsHost $env:RDS_HOST `
            -RdsPort $env:RDS_PORT

      - name: Install kubeconform
        shell: bash
        run: |
          set -euo pipefail
          version="v0.6.7"
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/${version}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kubeconform

      - name: Validate rendered manifests
        shell: bash
        run: |
          set -euo pipefail
          kubeconform -strict -ignore-missing-schemas -summary \
            rendered/service-account.yaml \
            rendered/secret-provider-class.yaml \
            rendered/job.yaml \
            rendered/configmap.yaml

      - name: Apply dependencies
        shell: bash
        run: |
          set -euo pipefail
          kubectl apply -f rendered/service-account.yaml
          kubectl apply -f rendered/secret-provider-class.yaml
          kubectl apply -f rendered/configmap.yaml
          kubectl apply -f rendered/job.yaml

      - name: Validate job
        shell: bash
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 1000))
          result="timeout"
          while [ $SECONDS -lt $deadline ]; do
            succeeded=$(kubectl get job "$JOB_NAME" -n "$NAMESPACE" -o jsonpath='{.status.succeeded}' 2>/dev/null || echo "")
            failed=$(kubectl get job "$JOB_NAME" -n "$NAMESPACE" -o jsonpath='{.status.failed}' 2>/dev/null || echo "")
            if [ "${succeeded:-0}" = "1" ]; then result="complete"; break; fi
            if [ -n "${failed:-}" ] && [ "${failed:-0}" != "0" ]; then result="failed"; break; fi
            sleep 10
          done
          echo "JOB_RESULT=$result" >> "$GITHUB_ENV"
          echo "Job result: $result"

      - name: Capture logs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          kubectl logs "job/$JOB_NAME" -n "$NAMESPACE" --all-containers=true > rendered/job.log 2>/dev/null || true
          if grep -Eiq 'AKIA[0-9A-Z]{16}|ASIA[0-9A-Z]{16}|-----BEGIN|server=tcp:|password=[^ ]' rendered/job.log; then
            echo "Potential secret leak in logs. Content will not be displayed." >&2
            exit 1
          fi
          echo "----- Sanitized Job logs -----"
          tail -n 60 rendered/job.log || true

      - name: Check job result
        shell: bash
        run: |
          set -euo pipefail
          if [ "${JOB_RESULT:-}" != "complete" ]; then
            echo "Job did not complete successfully. Result: ${JOB_RESULT:-unknown}." >&2
            kubectl describe job "$JOB_NAME" -n "$NAMESPACE" || true
            exit 1
          fi

      - name: Validate bootstrap
        shell: pwsh
        run: |
          ./scripts/validate-database-bootstrap.ps1 -Namespace $env:NAMESPACE -JobName $env:JOB_NAME -AwsRegion $env:AWS_REGION

      - name: Publish summary
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $config = Get-Content -LiteralPath 'config/database-bootstrap.json' -Raw | ConvertFrom-Json
          $dbs = @($config.databases | ForEach-Object { $_.name })
          $logins = @()
          foreach ($d in $config.databases) {
            $logins += $d.runtimeLogin; $logins += $d.migratorLogin
            foreach ($r in $d.readOnlyLogins) { $logins += $r }
          }
          $secrets = @($config.secrets.PSObject.Properties | ForEach-Object { $_.Value })
          $lines = @()
          $lines += '## Database Bootstrap'
          $lines += ''
          $lines += "Cluster: $env:CLUSTER_NAME"
          $lines += "Namespace: $env:NAMESPACE"
          $lines += "Job: $env:JOB_NAME"
          $lines += "Job result: $($env:JOB_RESULT)"
          $lines += ''
          $lines += 'Expected databases:'
          foreach ($d in $dbs) { $lines += "- $d" }
          $lines += ''
          $lines += 'Expected logins:'
          foreach ($l in $logins) { $lines += "- $l" }
          $lines += ''
          $lines += 'Validated secrets:'
          foreach ($s in $secrets) { $lines += "- $s" }
          $lines += ''
          $lines += 'SQL validation: executed by the Job.'
          $lines += 'Sensitive values were not printed.'
          ($lines -join "`n") | Add-Content -Path $env:GITHUB_STEP_SUMMARY
