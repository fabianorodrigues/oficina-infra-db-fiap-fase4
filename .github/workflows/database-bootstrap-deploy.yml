name: Database Bootstrap

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type BOOTSTRAP to initialize the databases.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: database-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap:
    name: Bootstrap SQL databases via ECS Run Task
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      SQL_TOOLS_IMAGE: ${{ vars.SQL_TOOLS_IMAGE }}
      ECS_TASK_EXECUTION_ROLE_ARN: ${{ vars.ECS_TASK_EXECUTION_ROLE_ARN }}
      ECS_TASK_ROLE_ARN: ${{ vars.ECS_TASK_ROLE_ARN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate request
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:GITHUB_REF -ne 'refs/heads/main') {
            throw 'This workflow must run from main.'
          }
          if ('${{ inputs.confirmation }}' -cne 'BOOTSTRAP') {
            throw 'Confirmation must be BOOTSTRAP.'
          }
          foreach ($name in @('AWS_REGION', 'SQL_TOOLS_IMAGE', 'ECS_TASK_EXECUTION_ROLE_ARN', 'ECS_TASK_ROLE_ARN')) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              throw "Repository Variable $name is required."
            }
          }
          if ($env:SQL_TOOLS_IMAGE -notmatch ':' -or $env:SQL_TOOLS_IMAGE -match ':latest$') {
            throw 'SQL_TOOLS_IMAGE must use an explicit tag or digest and never latest.'
          }

      - name: Validate contracts
        shell: pwsh
        run: |
          ./scripts/validate-database-secrets-config.ps1 -ConfigPath config/database-secrets.json
          ./scripts/validate-database-bootstrap-config.ps1 -ConfigPath config/database-bootstrap.json -SecretsConfigPath config/database-secrets.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Validate AWS identity
        shell: pwsh
        run: aws sts get-caller-identity

      - name: Resolve AWS metadata
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          function Get-Ssm([string]$name) {
            $v = aws ssm get-parameter --name $name --region $env:AWS_REGION --query 'Parameter.Value' --output text
            if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($v) -or $v -eq 'None') {
              throw "Missing or empty SSM parameter: $name"
            }
            return $v.Trim()
          }
          function Get-SecretArn([string]$id) {
            $v = aws secretsmanager describe-secret --secret-id $id --region $env:AWS_REGION --query 'ARN' --output text
            if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($v) -or $v -eq 'None') {
              throw "Secret not found: $id"
            }
            return $v.Trim()
          }

          $config = Get-Content -LiteralPath 'config/database-bootstrap.json' -Raw | ConvertFrom-Json
          $clusterName = Get-Ssm $config.ecs.clusterNameParameter
          $subnet1 = Get-Ssm $config.ecs.privateSubnet1Parameter
          $subnet2 = Get-Ssm $config.ecs.privateSubnet2Parameter
          $securityGroup = Get-Ssm $config.ecs.taskSecurityGroupParameter
          $repository = Get-Ssm $config.ecs.imageRepositoryParameter
          $rdsHost = Get-Ssm $config.rds.endpointParameter
          $rdsPort = Get-Ssm $config.rds.portParameter
          $masterArn = Get-Ssm $config.rds.masterSecretArnParameter

          if ($rdsPort -notmatch '^\d+$') { throw "Invalid RDS port in SSM: $rdsPort" }
          aws ecs describe-clusters --clusters $clusterName --region $env:AWS_REGION --query 'clusters[0].status' --output text | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "ECS cluster not found: $clusterName" }

          "CLUSTER_NAME=$clusterName" | Add-Content -Path $env:GITHUB_ENV
          "PRIVATE_SUBNET_1=$subnet1" | Add-Content -Path $env:GITHUB_ENV
          "PRIVATE_SUBNET_2=$subnet2" | Add-Content -Path $env:GITHUB_ENV
          "TASK_SECURITY_GROUP_ID=$securityGroup" | Add-Content -Path $env:GITHUB_ENV
          "BOOTSTRAP_REPOSITORY=$repository" | Add-Content -Path $env:GITHUB_ENV
          "BOOTSTRAP_IMAGE=$repository:$env:GITHUB_SHA" | Add-Content -Path $env:GITHUB_ENV
          "RDS_HOST=$rdsHost" | Add-Content -Path $env:GITHUB_ENV
          "RDS_PORT=$rdsPort" | Add-Content -Path $env:GITHUB_ENV
          "MASTER_SECRET_ARN=$masterArn" | Add-Content -Path $env:GITHUB_ENV

          $secretMap = @{
            CADASTRO_APP_PASSWORD = $config.secrets.cadastroRuntime
            CADASTRO_MIGRATOR_PASSWORD = $config.secrets.cadastroMigration
            ESTOQUE_APP_PASSWORD = $config.secrets.estoqueRuntime
            ESTOQUE_MIGRATOR_PASSWORD = $config.secrets.estoqueMigration
            ORDENS_APP_PASSWORD = $config.secrets.ordensRuntime
            ORDENS_MIGRATOR_PASSWORD = $config.secrets.ordensMigration
            AUTH_READ_PASSWORD = $config.secrets.authDatabase
          }
          foreach ($pair in $secretMap.GetEnumerator()) {
            $arn = Get-SecretArn $pair.Value
            "$($pair.Key)_SECRET_ARN=$arn" | Add-Content -Path $env:GITHUB_ENV
          }
          Write-Host "Resolved ECS, RDS, ECR and secret metadata."

      - name: Validate SQL secrets
        shell: pwsh
        run: ./scripts/validate-database-secret-containers.ps1 -ConfigPath config/database-secrets.json -Region $env:AWS_REGION -RequireCurrentVersion $true

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push bootstrap image
        shell: bash
        run: |
          set -euo pipefail
          docker build --build-arg SQL_TOOLS_IMAGE="$SQL_TOOLS_IMAGE" -f Dockerfile.bootstrap -t "$BOOTSTRAP_IMAGE" .
          docker push "$BOOTSTRAP_IMAGE"

      - name: Register task definition
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $container = @{
            name = 'db-bootstrap'
            image = $env:BOOTSTRAP_IMAGE
            essential = $true
            environment = @(
              @{ name = 'AWS_REGION'; value = $env:AWS_REGION },
              @{ name = 'RDS_HOST'; value = $env:RDS_HOST },
              @{ name = 'RDS_PORT'; value = $env:RDS_PORT }
            )
            secrets = @(
              @{ name = 'MASTER_USERNAME'; valueFrom = "$($env:MASTER_SECRET_ARN):username::" },
              @{ name = 'MASTER_PASSWORD'; valueFrom = "$($env:MASTER_SECRET_ARN):password::" },
              @{ name = 'CADASTRO_APP_PASSWORD'; valueFrom = "$($env:CADASTRO_APP_PASSWORD_SECRET_ARN):Password::" },
              @{ name = 'CADASTRO_MIGRATOR_PASSWORD'; valueFrom = "$($env:CADASTRO_MIGRATOR_PASSWORD_SECRET_ARN):Password::" },
              @{ name = 'ESTOQUE_APP_PASSWORD'; valueFrom = "$($env:ESTOQUE_APP_PASSWORD_SECRET_ARN):Password::" },
              @{ name = 'ESTOQUE_MIGRATOR_PASSWORD'; valueFrom = "$($env:ESTOQUE_MIGRATOR_PASSWORD_SECRET_ARN):Password::" },
              @{ name = 'ORDENS_APP_PASSWORD'; valueFrom = "$($env:ORDENS_APP_PASSWORD_SECRET_ARN):Password::" },
              @{ name = 'ORDENS_MIGRATOR_PASSWORD'; valueFrom = "$($env:ORDENS_MIGRATOR_PASSWORD_SECRET_ARN):Password::" },
              @{ name = 'AUTH_READ_PASSWORD'; valueFrom = "$($env:AUTH_READ_PASSWORD_SECRET_ARN):Password::" }
            )
            logConfiguration = @{
              logDriver = 'awslogs'
              options = @{
                'awslogs-group' = '/ecs/oficina/db-bootstrap'
                'awslogs-region' = $env:AWS_REGION
                'awslogs-stream-prefix' = 'bootstrap'
              }
            }
          }
          $taskDefinition = @{
            family = 'oficina-db-bootstrap'
            networkMode = 'awsvpc'
            requiresCompatibilities = @('FARGATE')
            cpu = '512'
            memory = '1024'
            executionRoleArn = $env:ECS_TASK_EXECUTION_ROLE_ARN
            taskRoleArn = $env:ECS_TASK_ROLE_ARN
            containerDefinitions = @($container)
          }
          $path = Join-Path $env:RUNNER_TEMP 'db-bootstrap-taskdef.json'
          $taskDefinition | ConvertTo-Json -Depth 20 | Set-Content -LiteralPath $path -Encoding utf8
          $arn = aws ecs register-task-definition --cli-input-json "file://$path" --region $env:AWS_REGION --query 'taskDefinition.taskDefinitionArn' --output text
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($arn)) { throw 'Failed to register bootstrap task definition.' }
          "TASK_DEFINITION_ARN=$arn" | Add-Content -Path $env:GITHUB_ENV

      - name: Run bootstrap task
        shell: bash
        run: |
          set -euo pipefail
          task_arn=$(aws ecs run-task \
            --cluster "$CLUSTER_NAME" \
            --launch-type FARGATE \
            --started-by database-bootstrap \
            --task-definition "$TASK_DEFINITION_ARN" \
            --network-configuration "awsvpcConfiguration={subnets=[$PRIVATE_SUBNET_1,$PRIVATE_SUBNET_2],securityGroups=[$TASK_SECURITY_GROUP_ID],assignPublicIp=DISABLED}" \
            --region "$AWS_REGION" \
            --query 'tasks[0].taskArn' \
            --output text)
          if [ -z "$task_arn" ] || [ "$task_arn" = "None" ]; then
            echo "ECS run-task did not return a task ARN." >&2
            exit 1
          fi
          echo "TASK_ARN=$task_arn" >> "$GITHUB_ENV"
          aws ecs wait tasks-stopped --cluster "$CLUSTER_NAME" --tasks "$task_arn" --region "$AWS_REGION"
          exit_code=$(aws ecs describe-tasks --cluster "$CLUSTER_NAME" --tasks "$task_arn" --region "$AWS_REGION" --query "tasks[0].containers[?name==\`db-bootstrap\`].exitCode | [0]" --output text)
          stopped_reason=$(aws ecs describe-tasks --cluster "$CLUSTER_NAME" --tasks "$task_arn" --region "$AWS_REGION" --query 'tasks[0].stoppedReason' --output text)
          echo "Task stopped: $stopped_reason"
          if [ "$exit_code" != "0" ]; then
            echo "Bootstrap task failed with exit code $exit_code." >&2
            exit 1
          fi

      - name: Publish summary
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $config = Get-Content -LiteralPath 'config/database-bootstrap.json' -Raw | ConvertFrom-Json
          $dbs = @($config.databases | ForEach-Object { $_.name })
          $lines = @()
          $lines += '## Database Bootstrap'
          $lines += ''
          $lines += "Cluster: $env:CLUSTER_NAME"
          $lines += "Task definition: $env:TASK_DEFINITION_ARN"
          $lines += "Task: $env:TASK_ARN"
          $lines += "Image: $env:BOOTSTRAP_IMAGE"
          $lines += ''
          $lines += 'Expected databases:'
          foreach ($d in $dbs) { $lines += "- $d" }
          $lines += ''
          $lines += 'Sensitive values were injected as ECS secrets and were not printed.'
          ($lines -join "`n") | Add-Content -Path $env:GITHUB_STEP_SUMMARY
