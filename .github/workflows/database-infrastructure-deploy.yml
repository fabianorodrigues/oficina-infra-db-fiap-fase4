name: Database Infrastructure Deploy

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type APPLY to reconcile the Terraform backend, database infrastructure and SQL secrets.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: database-infrastructure
  cancel-in-progress: false

jobs:
  deploy:
    name: Provision database infrastructure
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      TF_STATE_KEY_INFRA_DB: oficina/infra-db/terraform.tfstate
      TF_STATE_BUCKET_FALLBACK: ${{ vars.TF_STATE_BUCKET }}
      SQL_CADASTRO_APP_PASSWORD: ${{ secrets.SQL_CADASTRO_APP_PASSWORD }}
      SQL_CADASTRO_MIGRATOR_PASSWORD: ${{ secrets.SQL_CADASTRO_MIGRATOR_PASSWORD }}
      SQL_ESTOQUE_APP_PASSWORD: ${{ secrets.SQL_ESTOQUE_APP_PASSWORD }}
      SQL_ESTOQUE_MIGRATOR_PASSWORD: ${{ secrets.SQL_ESTOQUE_MIGRATOR_PASSWORD }}
      SQL_ORDENS_APP_PASSWORD: ${{ secrets.SQL_ORDENS_APP_PASSWORD }}
      SQL_ORDENS_MIGRATOR_PASSWORD: ${{ secrets.SQL_ORDENS_MIGRATOR_PASSWORD }}
      SQL_AUTH_READ_PASSWORD: ${{ secrets.SQL_AUTH_READ_PASSWORD }}
      RDS_ADMIN_CIDR: ${{ secrets.RDS_ADMIN_CIDR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate request
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:GITHUB_REF -ne 'refs/heads/main') {
            throw 'This workflow must run from main.'
          }
          if ('${{ inputs.confirmation }}' -cne 'APPLY') {
            throw 'Confirmation must be APPLY.'
          }
          if ([string]::IsNullOrWhiteSpace($env:AWS_REGION)) {
            throw 'Repository Variable AWS_REGION is required.'
          }
          $secretNames = @(
            'SQL_CADASTRO_APP_PASSWORD',
            'SQL_CADASTRO_MIGRATOR_PASSWORD',
            'SQL_ESTOQUE_APP_PASSWORD',
            'SQL_ESTOQUE_MIGRATOR_PASSWORD',
            'SQL_ORDENS_APP_PASSWORD',
            'SQL_ORDENS_MIGRATOR_PASSWORD',
            'SQL_AUTH_READ_PASSWORD'
          )
          $missing = @($secretNames | Where-Object { [string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($_)) })
          if ($missing.Count -gt 0) {
            throw "Missing Repository Secrets: $($missing -join ', ')"
          }
          if (-not [string]::IsNullOrWhiteSpace($env:RDS_ADMIN_CIDR)) {
            Write-Host 'Optional RDS admin CIDR is configured. The SQL Server security group will allow port 1433 from that CIDR.'
          }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Resolve Terraform backend
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $identity = aws sts get-caller-identity --output json | ConvertFrom-Json
          $deterministicBucket = "oficina-terraform-state-$($identity.Account)-$env:AWS_REGION"
          $bucket = $deterministicBucket
          if (-not [string]::IsNullOrWhiteSpace($env:TF_STATE_BUCKET_FALLBACK) -and $env:TF_STATE_BUCKET_FALLBACK -ne $deterministicBucket) {
            aws s3api head-bucket --bucket $deterministicBucket 2>$null
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "Using temporary TF_STATE_BUCKET fallback. Rename or migrate the state bucket to $deterministicBucket to remove this variable."
              $bucket = $env:TF_STATE_BUCKET_FALLBACK
            }
          }
          ./scripts/create-terraform-backend.ps1 -BucketName $bucket -Region $env:AWS_REGION
          ./scripts/validate-terraform-backend.ps1 -BucketName $bucket -Region $env:AWS_REGION
          "TF_STATE_BUCKET=$bucket" | Add-Content -Path $env:GITHUB_ENV
          "AWS_ACCOUNT_ID=$($identity.Account)" | Add-Content -Path $env:GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Terraform fmt
        working-directory: terraform/infra-db
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform/infra-db
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY_INFRA_DB}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform validate
        working-directory: terraform/infra-db
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint
        working-directory: terraform/infra-db
        run: tflint --init && tflint

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/infra-db
          framework: terraform
          check: CKV_AWS_16,CKV_AWS_17,CKV_AWS_23,CKV_AWS_24
          quiet: true

      - name: Export Terraform variables
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          "TF_VAR_aws_region=$env:AWS_REGION" | Add-Content -Path $env:GITHUB_ENV
          if (-not [string]::IsNullOrWhiteSpace($env:RDS_ADMIN_CIDR)) {
            "TF_VAR_rds_admin_cidr=$($env:RDS_ADMIN_CIDR.Trim())" | Add-Content -Path $env:GITHUB_ENV
          }

      - name: Terraform plan
        working-directory: terraform/infra-db
        run: terraform plan -input=false -out=tfplan

      - name: Validate plan safety
        working-directory: terraform/infra-db
        run: |
          set -euo pipefail
          terraform show -json tfplan > tfplan.json
          blocked=$(jq '[.resource_changes[]? | select(.type | IN("aws_vpc","aws_subnet","aws_db_instance","aws_secretsmanager_secret","aws_ssm_parameter")) | select(.change.actions | index("delete"))] | length' tfplan.json)
          if [ "$blocked" -gt 0 ]; then
            echo "Terraform plan contains delete or replacement actions for protected resources." >&2
            jq -r '.resource_changes[]? | select(.change.actions | index("delete")) | "- " + .address + " " + (.change.actions | join(","))' tfplan.json >&2
            exit 1
          fi
          {
            echo "## Database Infrastructure Plan"
            echo
            echo "| Action | Count |"
            echo "| --- | ---: |"
            for action in create update delete; do
              count=$(jq "[.resource_changes[]? | select(.change.actions | index(\"$action\"))] | length" tfplan.json)
              echo "| $action | $count |"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Terraform apply
        working-directory: terraform/infra-db
        run: terraform apply -input=false tfplan

      - name: Validate infrastructure
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $arguments = @{
            Region = $env:AWS_REGION
            ExpectedVpcCidr = '10.40.0.0/16'
          }
          if (-not [string]::IsNullOrWhiteSpace($env:RDS_ADMIN_CIDR)) {
            $arguments.RdsAdminCidr = $env:RDS_ADMIN_CIDR.Trim()
          }
          ./scripts/validate-infra-db.ps1 @arguments

      - name: Validate secrets contract
        shell: pwsh
        run: ./scripts/validate-database-secrets-config.ps1 -ConfigPath config/database-secrets.json

      - name: Validate secret containers
        shell: pwsh
        run: ./scripts/validate-database-secret-containers.ps1 -ConfigPath config/database-secrets.json -Region $env:AWS_REGION -RequireCurrentVersion $false

      - name: Synchronize SQL secrets
        shell: pwsh
        run: ./scripts/sync-database-secrets.ps1 -ConfigPath config/database-secrets.json -Region $env:AWS_REGION

      - name: Validate SQL secrets
        shell: pwsh
        run: ./scripts/validate-database-secret-containers.ps1 -ConfigPath config/database-secrets.json -Region $env:AWS_REGION -RequireCurrentVersion $true

      - name: Publish summary
        shell: pwsh
        run: |
          $config = Get-Content -LiteralPath 'config/database-secrets.json' -Raw | ConvertFrom-Json
          $secretNames = @($config.targets | ForEach-Object { $_.secretName })
          $rdsAccess = if ([string]::IsNullOrWhiteSpace($env:RDS_ADMIN_CIDR)) {
            '- Private SQL Server RDS'
          }
          else {
            '- Private SQL Server RDS with optional 1433 admin ingress restricted to the configured CIDR'
          }
          $lines = @(
            '## Database Infrastructure Deploy',
            '',
            "Account ID: $env:AWS_ACCOUNT_ID",
            "Region: $env:AWS_REGION",
            "Terraform state bucket: $env:TF_STATE_BUCKET",
            "Terraform state key: $env:TF_STATE_KEY_INFRA_DB",
            '',
            'Provisioned and validated:',
            '- Terraform backend',
            '- VPC, subnets, routing and NAT',
            $rdsAccess,
            '- Non-sensitive SSM parameters',
            '- SQL secret containers',
            '- SQL secret AWSCURRENT versions',
            '',
            "SQL secrets synchronized: $($secretNames.Count)",
            '',
            'Sensitive values were not printed.'
          )
          ($lines -join "`n") | Add-Content -Path $env:GITHUB_STEP_SUMMARY
